name: Auto Recolector Thoth

on:
  schedule:
    - cron: '0 2 * * *' # Todos los días a las 02:00 AM UTC
  workflow_dispatch: # Permite ejecución manual

jobs:
  recolectar-y-subir:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f data-pipeline/requirements.txt ]; then pip install -r data-pipeline/requirements.txt; fi

      - name: Ejecutar Recolector
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd data-pipeline
          # Ejecuta el recolector para el dominio de autónomos (puedes añadir más líneas para otros dominios)
          python collector.py --config config/autonomos.yml --output ./corpus_normativa

      - name: Subir a Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd data-pipeline
          # Sube los datos a Supabase
          python upload_to_supabase.py --db ./corpus_normativa/autonomos/corpus_autonomos.sqlite --supabase-url $SUPABASE_URL --supabase-key $SUPABASE_KEY
